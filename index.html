<body>
    <header>
        <h1>Conversor Salário Portugal</h1>
        <p>Converta seu salário bruto para líquido</p>
    </header>

    <main>
        <div class="container">
            <div class="input-group">
                <label for="salarioBruto">Salário Bruto Mensal (€)</label>
                <input type="number" id="salarioBruto" placeholder="Ex: 1500">
            </div>

            <div class="input-group">
                <label for="dependentes">Nº de Dependentes</label>
                <input type="number" id="dependentes" placeholder="Ex: 0">
            </div>

            <button onclick="calcularSalario()">Calcular Salário Líquido</button>

            <div id="resultado" class="resultado"></div>
        </div>
