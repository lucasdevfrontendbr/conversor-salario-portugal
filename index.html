<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor Salário Portugal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="banner-titulo">
        <h1>CONVERSOR SALÁRIO PORTUGAL</h1>
    </div>
    
    <p class="subtitulo">Converta seu salário bruto para líquido</p>

    <div class="container-principal">
        <div class="cubo-portugal">
            <div class="face frente">PORTUGAL</div>
            <div class="face tras"></div>
            <div class="face direita"></div>
            <div class="face esquerda"></div>
            <div class="face topo"></div>
            <div class="face baixo"></div>
        </div>

        <div class="card-calculadora">
            <div class="input-group">
                <label>Salário Bruto Mensal (€)</label>
                <input type="number" id="salarioBruto" placeholder="2500">
            </div>
            
            <div class="input-group">
                <label>Nº de Dependentes</label>
                <input type="number" id="dependentes" placeholder="3">
            </div>

            <button id="calcularBtn">Calcular Salário Líquido</button>

            <div id="resultado"></div>
        </div>

        <div class="card-contato">
            <h3>Gostou do projeto? Fala comigo!</h3>
            <p>Lucas Lima - Dev Junior</p>
            <div class="icones">
                <a href="#" class="icone">in</a>
                <a href="#" class="icone">GH</a>
                <a href="mailto:lucasdutil10@gmail.com" class="icone">@</a>
                <a href="https://wa.me/5521998863019" class="icone">W</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
